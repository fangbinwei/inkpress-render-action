name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit
      - run: pnpm run build
      - name: Verify dist/ is up to date
        run: |
          if ! git diff --quiet --exit-code -- dist/; then
            echo "::error::dist/ is out of sync with src/. Run 'pnpm run build' and commit the result."
            git diff -- dist/
            exit 1
          fi
